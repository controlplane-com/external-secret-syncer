providers:
  - name: my-vault
    vault:
      address: https://myvault.com
      token: default
    syncInterval: 10s
  - name: my-aws
    awsSecretsManager:
      region: us-west-2
  - name: my-doppler
    doppler:
      accessToken: dp.st.example
  - name: my-1p-connect
    onePasswordConnect:
      serverURL: http://localhost:8080
      token: mock-token
  - name: my-infisical
    infisical:
      clientId: example-client-id
      clientSecret: example-client-secret
      projectId: example-project-id
  - name: my-gcp
    gcpSecretManager:
      projectId: my-gcp-project
secrets:
  - name: hello1
    provider: my-vault
    syncInterval: 20s
    dictionary:
      PORT:
        path: /v1/secret/data/app
        parse: port
        default: 5432
      PASSWORD:
        path: /v1/secret/data/app
        parse: password
      USERNAME:
        default: 'no username'
        path: /v1/secret/data/app
        parse: username
      SECRET: /v1/secret/data/app
  - name: hello2
    provider: my-aws
    opaque: /path/to/settings.json
  - name: doppler-app-config
    provider: my-doppler
    syncInterval: 30s
    dictionaryFromProject:
      path: my-project/dev
  - name: test-secret
    provider: my-1p-connect
    opaque: ESS Test/My App/password
  - name: infisical-secret
    provider: my-infisical
    opaque: dev/DATABASE_URL
  - name: infisical-app-config
    provider: my-infisical
    dictionaryFromProject:
      path: dev
  # Discover every secret in the GCP project and create one cpln secret each.
  # A GCP secret labeled `cpln-type=dictionary` is parsed as JSON and flattened
  # into a dictionary secret; otherwise (or `cpln-type=opaque`) it becomes an
  # opaque secret. GCP-only.
  - name: gcp-discover-all
    provider: my-gcp
    discoverAllSecrets: true
